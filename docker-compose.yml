x-app: &app
  build:
    context: .
    dockerfile: Dockerfile.development
    target: app
    args:
      - "UID=${UID:-1000}"
      - "GID=${GID:-1000}"
  env_file:
    - .env
  restart: "${DOCKER_RESTART_POLICY:-unless-stopped}"
  stop_grace_period: "3s"
  tty: true
  volumes:
    - .:/app
    - bundle:/usr/local/bundle
  networks:
    - app

x-backend: &backend
  <<: *app
  stdin_open: true
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgis/postgis:16-3.5
    platform: linux/amd64
    container_name: app-postgres
    env_file:
      - .env
    restart: "${DOCKER_RESTART_POLICY:-unless-stopped}"
    stop_grace_period: "3s"
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "9999:5432"
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-bookworm
    container_name: app-redis
    restart: "${DOCKER_RESTART_POLICY:-unless-stopped}"
    stop_grace_period: "3s"
    volumes:
      - redis:/data
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    <<: *backend
    container_name: app-web
    entrypoint: ./bin/docker-entrypoint
    command: bash -c "./bin/setup --skip-server && ./bin/dev"
    ports:
      - "3000:3000"

  # Use this service to run Rails CLI commands (generate new project, migrations, etc.)
  cli:
    <<: *backend
    container_name: app-cli
    profiles:
      - cli
    command: bash

volumes:
  postgres:
  redis:
  bundle:

networks:
  app:
    name: app
    driver: bridge
